<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>運動RPG</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Noto+Sans+JP:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
  <!-- 背景レイヤー -->
  <div id="bg-layer"></div>

  <!-- メインレイアウト -->
  <div id="layout-wrapper">
    
    <!-- 左サイドパネル (PCのみ) -->
    <aside class="side-panel left">
      <div class="deco-widget">
        <div class="deco-label">SYSTEM_OS</div>
        <div class="deco-value">v2.4.0_ACTIVE</div>
        <div class="deco-bar"><span></span></div>
      </div>
      <div class="deco-widget" style="margin-top: 40px;">
        <div class="deco-label">HEART_RATE</div>
        <div class="deco-value">MONITORING...</div>
        <div class="deco-graph">
          <div class="bar" style="height:30%"></div>
          <div class="bar" style="height:50%"></div>
          <div class="bar" style="height:80%"></div>
          <div class="bar" style="height:60%"></div>
          <div class="bar" style="height:90%"></div>
        </div>
      </div>
    </aside>

    <!-- アプリ本体 -->
    <main id="app-container">
      <!-- ナビゲーション -->
      <nav id="nav">
        <button class="nav-btn active" data-screen="home">ホーム</button>
        <button class="nav-btn" data-screen="workout">運動</button>
        <button class="nav-btn" data-screen="badges">実績</button>
        <button class="nav-btn" data-screen="history">履歴</button>
      </nav>

      <div id="app-content">
        <!-- ホーム画面 -->
        <section id="screen-home" class="screen active">
          <div id="character-display">
            <div id="character-emoji">🐣</div>
            <div id="character-level">Lv.1</div>
          </div>
          <div id="xp-bar-container">
            <div id="xp-bar"></div>
          </div>
          <div id="xp-label">0 / 100 XP</div>
          <button id="btn-go-workout">運動する！</button>
        </section>

        <!-- 運動選択画面 -->
        <section id="screen-workout" class="screen">
          <h2>運動を選ぼう</h2>
          <div id="exercise-list"></div>
        </section>

        <!-- 実績画面 -->
        <section id="screen-badges" class="screen">
          <h2>実績バッジ</h2>
          <div id="badge-list"></div>
        </section>

        <!-- 履歴画面 -->
        <section id="screen-history" class="screen">
          <h2>運動履歴</h2>
          <div id="history-list"></div>
        </section>
      </div>

      <!-- データリセット -->
      <footer>
        <button id="btn-reset">データをリセット</button>
      </footer>
    </main>

    <!-- 右サイドパネル (PCのみ) -->
    <aside class="side-panel right">
      <div class="deco-widget">
        <div class="deco-label">CURRENT_MISSION</div>
        <div class="deco-value">BODY_TRANSFORM</div>
      </div>
      <div class="deco-widget" style="margin-top: 40px;">
        <div class="deco-label">STREAK_STATUS</div>
        <div class="deco-value">SYNC_COMPETE</div>
        <div class="deco-matrix">
          <div>1</div><div>0</div><div>1</div>
          <div>0</div><div>1</div><div>1</div>
          <div>1</div><div>1</div><div>0</div>
        </div>
      </div>
    </aside>

  </div>

  <!-- ポップアップ -->
  <div id="popup" class="popup hidden">
    <div id="popup-content"></div>
  </div>

  <script src="app.js"></script>
</body>
</html>
